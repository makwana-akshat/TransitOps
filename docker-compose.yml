version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: transitops_backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: transitops_frontend
    ports:
      - '5173:5173'
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
