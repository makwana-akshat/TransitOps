version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitops-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-postgresql+psycopg://postgres:postgres@host.docker.internal:5432/postgres}
    restart: unless-stopped
